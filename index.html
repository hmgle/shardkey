<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="app.title">ShardKey - 答题解锁秘密</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>ShardKey</h1>
            <div class="lang-switch">
                <label class="sr-only" for="lang-select" data-i18n="ui.language">语言</label>
                <select id="lang-select" aria-label="Language">
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                    <option value="zh-CN">简体中文</option>
                    <option value="zh-TW">繁體中文</option>
                </select>
            </div>
            <p data-i18n="app.tagline">通过回答问题离线解锁秘密的工具</p>
        </header>

        <div id="runtime-warning" class="hidden"></div>

        <!-- 标签切换 -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="create" data-i18n="tabs.create">创建挑战</button>
            <button class="tab-btn" data-tab="solve" data-i18n="tabs.solve">求解挑战</button>
        </div>

        <!-- ==================== 创建面板 ==================== -->
        <div id="panel-create" class="panel active">
            <!-- 秘密输入 -->
            <div class="card">
                <h2 data-i18n="create.secret.title">设置秘密</h2>
                <div class="form-group">
                    <label for="secret-input" data-i18n="create.secret.label">要分享的秘密</label>
                    <textarea id="secret-input" data-i18n-placeholder="create.secret.placeholder" placeholder="输入你的秘密，例如手机号、密码、一段话..."></textarea>
                    <div class="form-hint" data-i18n="create.secret.hint">支持中文、英文、数字和符号。秘密将被加密，只有正确回答足够多的问题才能恢复。</div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="challenge-title" data-i18n="create.title.label">挑战标题（可选）</label>
                        <input type="text" id="challenge-title" data-i18n-placeholder="create.title.placeholder" placeholder="例如：获取我的手机号">
                    </div>
                    <div class="form-group">
                        <label for="challenge-desc" data-i18n="create.desc.label">挑战描述（可选）</label>
                        <input type="text" id="challenge-desc" data-i18n-placeholder="create.desc.placeholder" placeholder="例如：回答问题获取秘密">
                    </div>
                </div>
            </div>

            <!-- 问题列表 -->
            <div class="card">
                <h2 data-i18n="create.questions.title">设置问题</h2>
                <div id="question-list">
                    <!-- 动态生成 -->
                </div>
                <button class="btn btn-secondary" id="btn-add-question" data-i18n="create.questions.add">+ 添加问题</button>
            </div>

            <!-- 门限设置 -->
            <div class="card">
                <h2 data-i18n="create.threshold.title">门限设置</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label for="threshold-input" data-i18n="create.threshold.label">门限值</label>
                        <input type="number" id="threshold-input" min="2" max="64" value="3">
                        <div class="form-hint" data-i18n="create.threshold.hint">需要正确回答的最少问题数。值越大越安全，但也要求回答者知道更多答案。</div>
                    </div>
                    <div class="form-group">
                        <label data-i18n="create.question_count.label">问题总数</label>
                        <input type="text" id="question-count-display" disabled value="0">
                    </div>
                </div>
            </div>

            <!-- 生成按钮 -->
            <div class="card">
                <button class="btn btn-primary btn-block" id="btn-generate" data-i18n="create.generate">生成挑战</button>
                <div id="generate-progress" class="hidden">
                    <div class="progress-bar"><div class="fill" id="progress-fill"></div></div>
                    <div class="progress-text" id="progress-text"></div>
                </div>
                <div id="generate-result" class="hidden"></div>
            </div>
        </div>

        <!-- ==================== 求解面板 ==================== -->
        <div id="panel-solve" class="panel">
            <!-- 加载挑战 -->
            <div class="card" id="solve-load-card">
                <h2 data-i18n="solve.load.title">加载挑战</h2>
                <p class="solve-load-desc">
                    <span data-i18n="solve.load.desc">通过链接自动加载，或手动导入挑战文件。</span>
                </p>
                <div class="form-hint solve-load-note" data-i18n="solve.load.note">本工具完全离线运行；弱答案仍可能被离线猜解。</div>
                <div class="btn-group">
                    <div class="file-input-wrapper">
                        <button class="btn btn-secondary" data-i18n="solve.load.from_file">从文件导入</button>
                        <input type="file" id="file-import" accept=".json">
                    </div>
                    <button class="btn btn-secondary" id="btn-paste-link" data-i18n="solve.load.paste_link">粘贴链接</button>
                </div>
                <div id="solve-load-error" class="hidden"></div>
                <div id="paste-link-area" class="hidden paste-link-area">
                    <textarea id="paste-link-input" data-i18n-placeholder="solve.load.link_placeholder" placeholder="粘贴包含挑战数据的链接..." class="paste-link-input"></textarea>
                    <button class="btn btn-primary paste-link-submit" id="btn-load-link" data-i18n="solve.load.load">加载</button>
                </div>
            </div>

            <!-- 挑战信息和问题（加载后显示） -->
            <div id="solve-content" class="hidden">
                <div class="card">
                    <div class="challenge-info">
                        <div class="info-title" id="solve-title"></div>
                        <div class="info-desc" id="solve-desc"></div>
                        <div class="info-meta" id="solve-meta"></div>
                        <div class="solve-toolbar">
                            <button class="btn btn-secondary" id="btn-change-challenge" data-i18n="solve.change">更换挑战</button>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h2 data-i18n="solve.questions.title">回答问题</h2>
                    <div id="solve-questions">
                        <!-- 动态生成 -->
                    </div>
                    <button class="btn btn-success btn-block" id="btn-solve" data-i18n="solve.unlock">解锁秘密</button>
                    <div id="solve-result" class="hidden"></div>
                </div>
            </div>
        </div>

        <footer>
            <span data-i18n="footer.text">ShardKey · 离线问答解锁器</span>
        </footer>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
